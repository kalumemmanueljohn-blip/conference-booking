{% extends 'base.html' %}
{% load static %}

{% block title %}Requête incorrecte - 400{% endblock %}

{% block content %}
<div class="container text-center py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-lg">
                <div class="card-body p-5">
                    <div class="mb-4">
                        <i class="bi bi-bug-fill" style="font-size: 5rem; color: #FFD700;"></i>
                    </div>
                    <h1 class="display-1 fw-bold text-dark">400</h1>
                    <h2 class="h4 mb-3 text-dark">Requête incorrecte</h2>
                    <p class="text-muted mb-4">
                        La requête envoyée au serveur est incorrecte ou mal formée.
                    </p>
                    <a href="{% url 'home' %}" class="btn btn-primary">
                        <i class="bi bi-house-door"></i> Retour à l'accueil
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
