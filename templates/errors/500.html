{% extends 'base.html' %}
{% load static %}

{% block title %}Erreur serveur - 500{% endblock %}

{% block content %}
<div class="container text-center py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-lg">
                <div class="card-body p-5">
                    <div class="mb-4">
                        <i class="bi bi-server" style="font-size: 5rem; color: #dc3545;"></i>
                    </div>
                    <h1 class="display-1 fw-bold text-dark">500</h1>
                    <h2 class="h4 mb-3 text-dark">Erreur interne du serveur</h2>
                    <p class="text-muted mb-4">
                        Une erreur s'est produite. Nos équipes ont été notified et travaillent sur la résolution.
                    </p>
                    <a href="{% url 'home' %}" class="btn btn-primary">
                        <i class="bi bi-house-door"></i> Retour à l'accueil
                    </a>
                    <button onclick="location.reload()" class="btn btn-outline-secondary ms-2">
                        <i class="bi bi-arrow-repeat"></i> Réessayer
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
